<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="CSS/Style.css">
</head>
<body>
    <a href="start">HomePage</a>
    
    <div id="register">
        <h1>Create user:</h1>
        <input type="text" name="" placeholder="Username" id="regUsername">
        <br>
        <input type="password" name="" placeholder="Password" id="regPassword">
        <p id="regStatus"></p>
        <button onclick="register()">Register</button>
    </div>

    <div id="login">
        <h1>login:</h1>
        <input type="text" name="" placeholder="Username" id="loginUsername">
        <br>
        <input type="password" name="" placeholder="Password" id="loginPassword">
        <p id="loginStatus"></p>
        <button onclick="authenticate()">login</button>
    </div>

<script src="JS/auth.js"></script>
</body>
</html>
